version: '3.8'

services:
  # Paste Service
  paste:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paste
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./paste.db
      STORAGE_PATH: /app/storage
      EXPIRATION_HOURS: 24
      ID_LENGTH: 6
      MAX_FILE_SIZE: 10485760
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - paste_storage:/app/storage
      - paste_db:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  paste_storage:
  paste_db:
